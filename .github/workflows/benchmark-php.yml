name: Benchmark PHP

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch:

# Read-only by default; each job widens only the scope it needs.
permissions:
  contents: read

jobs:
  # Report-only: runs the benchmark and posts its comparison, but never fails
  # the build. Microsecond benchmarks land on a different shared runner each run,
  # so absolute times shift run-to-run regardless of the code - a hard gate
  # against a committed baseline cannot be made reliable.
  benchmark-php:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    # Write access only to the PR comment and the trend issue; no repo writes.
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.3
          extensions: none, ctype, dom, filter, hash, libxml, mbstring, pcre, pdo, phar, posix, readline, reflection, session, simplexml, spl, tokenizer, xml, xmlwriter
          tools: none

      - name: Install dependencies
        run: composer install

      # continue-on-error keeps a perf delta from failing the build, while the
      # step status still reflects a genuine benchmark error (no exit code is
      # swallowed), so a broken benchmark is visible rather than masked.
      - name: Run performance benchmarks
        id: perf-test
        run: composer benchmark
        continue-on-error: true

      - name: Upload performance report as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{github.job}}-performance-report
          path: |
            .logs/performance-report.csv
            .logs/performance-report.json
            .logs/performance-report.html
          if-no-files-found: warn

      - name: Format performance results for PR comment
        if: github.event_name == 'pull_request' && hashFiles('.logs/performance-report.html') != ''
        run: |
          echo "## 🚀 Performance comparison (informational)" >> pr_comment.md
          echo "" >> pr_comment.md
          echo "_A tracking signal, not a pass/fail gate: microsecond benchmarks land on a different shared CI runner each run, so percentages vs the committed baseline shift run-to-run regardless of the code._" >> pr_comment.md
          echo "" >> pr_comment.md
          echo "<div>" >> pr_comment.md
          sed -n '/<table/,/<\/table>/p' .logs/performance-report.html >> pr_comment.md
          echo "</div>" >> pr_comment.md

      - name: Comment PR with performance results
        if: github.event_name == 'pull_request' && hashFiles('.logs/performance-report.html') != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr_comment.md

      - name: Find performance benchmarks issue
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && hashFiles('.logs/performance-report.html') != ''
        id: find-issue
        run: |
          ISSUE_NUMBER=$(gh issue list --state open --search "Performance benchmarks" --json number --jq '.[0].number')
          echo "issue-number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Format performance results for issue comment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && hashFiles('.logs/performance-report.html') != ''
        run: |
          echo "## 📊 Performance Benchmark Results" > issue_comment.md
          echo "" >> issue_comment.md
          echo "**Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" >> issue_comment.md
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> issue_comment.md
          echo "<div>" >> issue_comment.md
          sed -n '/<table/,/<\/table>/p' .logs/performance-report.html >> issue_comment.md
          echo "</div>" >> issue_comment.md

      - name: Post performance results to issue
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && steps.find-issue.outputs.issue-number != ''
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          issue-number: ${{ steps.find-issue.outputs.issue-number }}
          body-path: issue_comment.md
          edit-mode: replace

  # Manual baseline refresh: regenerates the baseline on the CI runner (the same
  # environment the comparison runs in) and commits the single replacement back.
  # Run it from the Actions tab on the branch whose baseline you want to refresh.
  refresh-baseline:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    # Repo write access is confined to this manual, maintainer-triggered job.
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Cache Composer dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.3
          extensions: none, ctype, dom, filter, hash, libxml, mbstring, pcre, pdo, phar, posix, readline, reflection, session, simplexml, spl, tokenizer, xml, xmlwriter
          tools: none

      - name: Install dependencies
        run: composer install

      - name: Regenerate baseline on CI
        run: |
          rm -rf .phpbench/storage
          composer benchmark-baseline
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .phpbench/storage
          git commit -m "Regenerated performance baseline on CI. [skip ci]" || echo "Baseline unchanged"
          git push origin HEAD:${{ github.ref_name }}
